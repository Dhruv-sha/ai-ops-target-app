name: CI/CD Pipeline
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Tests
        # This will pass for now, but if you want to test a failure, 
        # change 'true' to 'false' or write a failing test.
        run: npm test || true 

      # The magic happens here: GitHub automatically sends the 
      # 'workflow_run' event to your Webhook when this finishes.